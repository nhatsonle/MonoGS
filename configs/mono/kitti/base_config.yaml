Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 10
  use_gui: False
  eval_rendering: True
  use_wandb: False

Dataset:
  type: "kitti"
  sensor_type: "monocular"
  camera: "image_2"
  projection_key: "P2"
  num_frames: -1
  pcd_downsample: 64
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 100
  mapping_itr_num: 80
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01

  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: "slam"
  single_thread: False
  spherical_harmonics: False

  lifecycle:
    enabled: False

  dust3r:
    enabled: False
    checkpoint: "checkpoints/DUSt3R_ViTLarge_BaseDecoder_512_dpt.pth"
    device: "cuda"
    image_size: 512
    batch_size: 1
    scale_min: 0.05
    scale_max: 20.0
    min_baseline: 0.50
    max_baseline: 20.0
    require_initialized: False
    depth_min: 1.0
    depth_max: 80.0
    max_point_radius: 100.0
    outlier_filter:
      enabled: True
      nb_neighbors: 20
      std_ratio: 2.0
    insertion:
      enabled: True
      opacity_threshold: 0.35
      rgb_residual_threshold: 0.12
      min_opacity_floor: 0.08
      min_points: 512
    alignment:
      enabled: False
      required: False
    optimization:
      enabled: False
      min_keyframe_gap: 0
      mapping_iters_with_dust3r: 40
      mapping_iters_without_dust3r: 80
      preinit_mapping_iters_with_dust3r: 80
      initial_ba_iters_with_dust3r: 300
      skip_densify_after_insert: 0
      min_insert_points_for_fast_mapping: 1024

  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
