inherit_from: "configs/mono/tum/base_config.yaml"

Results:
  use_gui: False
  eval_rendering: True

Training:
  lifecycle:
    enabled: False
    newborn_grace: 3
    stable_min_visibility: 3
    cold_min_age: 10
    cold_grad_threshold: 0.00001
    cold_opacity_threshold: 0.4
    bad_opacity_threshold: 0.05
    bad_min_visibility: 1
    bad_patience: 3
    freeze_cold: True
    prune_bad: True
    log_interval: 10

  dust3r:
    enabled: False
    checkpoint: "checkpoints/DUSt3R_ViTLarge_BaseDecoder_512_dpt.pth"
    device: "cuda"
    image_size: 512
    batch_size: 1
    scale:
      baseline_ratio: True
      pointmap_sync: True
    scale_min: 0.05
    scale_max: 20.0
    min_baseline: 0.10
    max_baseline: 1.50
    require_initialized: True
    depth_min: 0.05
    depth_max: 8.0
    max_point_radius: 10.0
    outlier_filter:
      enabled: True
      nb_neighbors: 20
      std_ratio: 2.0
    insertion:
      enabled: True
      opacity_threshold: 0.35
      rgb_residual_threshold: 0.12
      min_opacity_floor: 0.08
      min_points: 128
    alignment:
      enabled: False
      required: False
      min_points: 128
      sample_points: 4096
      ransac_iterations: 64
      inlier_threshold: 0.08
      max_rmse: 0.08
      opacity_threshold: 0.65
      min_scale_correction: 0.67
      max_scale_correction: 1.50
    optimization:
      enabled: False
      min_keyframe_gap: 0
      mapping_iters_with_dust3r: 5
      mapping_iters_without_dust3r: 10
      preinit_mapping_iters_with_dust3r: 20
      initial_ba_iters_with_dust3r: 150
      skip_densify_after_insert: 0
      min_insert_points_for_fast_mapping: 256

Dataset:
  dataset_path: "datasets/tum/rgbd_dataset_freiburg3_long_office_household"
  num_frames: 500
  Calibration:
    fx: 535.4
    fy: 539.2
    cx: 320.1
    cy: 247.6
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 640
    height: 480
    depth_scale: 5000.0
    distorted: False
