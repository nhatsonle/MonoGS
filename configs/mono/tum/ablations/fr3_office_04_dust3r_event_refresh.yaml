inherit_from: "configs/mono/tum/ablations/fr3_office_00_monogs.yaml"

Training:
  dust3r:
    enabled: True
    mode: adaptive
    require_initialized: False
    depth_max: 20.0
    scale:
      baseline_ratio: True
    init:
      enabled: True
      mode: "single_view"
      fallback_to_depth: False
      only: True
      backproject_depth: True
    refresh:
      enabled: True
      backproject_depth: True
    optimization:
      min_keyframe_gap: 999999
  lifecycle:
    enabled: true
    mode: adaptive
    aggressiveness: 0.5
    local_only: true
    log_interval: 10
